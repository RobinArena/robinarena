# Generated by nstack. Ingress is managed by Dokploy Domains/Traefik.
name: "robinshark"
services:
  frontend:
    image: "robinshark-frontend:${NSTACK_IMAGE_TAG:-local}"
    pull_policy: "build"
    build:
      context: "${NSTACK_BUILD_CONTEXT:-../..}"
      dockerfile: "frontend/Dockerfile"
      platforms:
        - "linux/amd64"
      args:
        NSTACK_GIT_COMMIT: "${NSTACK_GIT_COMMIT}"
    restart: "unless-stopped"
    environment:
      NODE_ENV: "production"
      HOST: "0.0.0.0"
      PORT: "3000"
      NITRO_HOST: "0.0.0.0"
      NITRO_PORT: "3000"
      NUXT_PUBLIC_API_BASE_URL: "/api"
      NUXT_PUBLIC_NSTACK_API_BASE_URL: "/api"
      NUXT_PUBLIC_NSTACK_TARGET: "prod"
      NUXT_PUBLIC_NSTACK_DOMAIN: "robinshark.playground.nik.technology"
      NUXT_PUBLIC_NSTACK_PROD_API_BASE_URL: "/api"
      NUXT_PUBLIC_NSTACK_PROD_DOMAIN: "robinshark.playground.nik.technology"
      NUXT_API_SERVER_BASE_URL: "http://robinshark-backend:8080"
      NUXT_API_INTERNAL_BASE_URL: "http://robinshark-backend:8080"
      NSTACK_TARGET: "prod"
      NSTACK_DOMAIN: "robinshark.playground.nik.technology"
      NSTACK_API_BASE_URL: "http://robinshark-backend:8080"
      NSTACK_PUBLIC_API_BASE_URL: "/api"
      NSTACK_APP_SLUG: "robinshark"
      NSTACK_BACKEND_HOST: "robinshark-backend"
      NSTACK_GIT_COMMIT: "${NSTACK_GIT_COMMIT:-local}"
      NSTACK_IMAGE_TAG: "${NSTACK_IMAGE_TAG:-local}"
    expose:
      - "3000"
    networks:
      default: {}
      dokploy-network: {}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.nstack-robinshark-frontend.rule=Host(`robinshark.playground.nik.technology`) && PathPrefix(`/`)"
      - "traefik.http.routers.nstack-robinshark-frontend.entrypoints=websecure"
      - "traefik.http.routers.nstack-robinshark-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nstack-robinshark-frontend.service=nstack-robinshark-frontend-service"
      - "traefik.http.routers.nstack-robinshark-frontend.priority=1"
      - "traefik.http.services.nstack-robinshark-frontend-service.loadbalancer.server.port=3000"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"const net=require('node:net'); const socket=net.connect(3000, '127.0.0.1'); const done=(code)=>{socket.destroy();process.exit(code)}; socket.once('connect',()=>done(0)); socket.once('error',()=>done(1)); setTimeout(()=>done(1),1000)\""
      interval: "30s"
      timeout: "1s"
      retries: 3
      start_period: "30s"
      start_interval: "1s"
    depends_on:
      backend:
        condition: "service_started"
  backend:
    image: "robinshark-backend:${NSTACK_IMAGE_TAG:-local}"
    pull_policy: "build"
    build:
      context: "${NSTACK_BUILD_CONTEXT:-../..}"
      dockerfile: "backend/Dockerfile"
      platforms:
        - "linux/amd64"
      args:
        ENCORE_INFRA_CONFIG_B64: "${ENCORE_INFRA_CONFIG_B64:?set ENCORE_INFRA_CONFIG_B64}"
    restart: "unless-stopped"
    environment:
      PORT: "8080"
      NODE_ENV: "production"
      APP_ID: "robinshark"
      APP_VERSION: "${NSTACK_GIT_COMMIT:-local}"
      GIT_COMMIT: "${NSTACK_GIT_COMMIT:-local}"
      IMAGE_TAG: "${NSTACK_IMAGE_TAG:-local}"
      NSTACK_TARGET: "prod"
      NSTACK_DOMAIN: "robinshark.playground.nik.technology"
      NSTACK_POSTGRES_PASSWORD: "${NSTACK_POSTGRES_PASSWORD:?set NSTACK_POSTGRES_PASSWORD}"
      ArenaOperatorKey: "${ArenaOperatorKey:?set ArenaOperatorKey}"
      OpenRouterAPIKey: "${OpenRouterAPIKey:?set OpenRouterAPIKey}"
    expose:
      - "8080"
    networks:
      default:
        aliases:
          - "robinshark-backend"
      dokploy-network: {}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.nstack-robinshark-api.rule=Host(`robinshark.playground.nik.technology`) && PathPrefix(`/api`)"
      - "traefik.http.routers.nstack-robinshark-api.entrypoints=websecure"
      - "traefik.http.routers.nstack-robinshark-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.nstack-robinshark-api.service=nstack-robinshark-api-service"
      - "traefik.http.routers.nstack-robinshark-api.priority=1000"
      - "traefik.http.services.nstack-robinshark-api-service.loadbalancer.server.port=8080"
      - "traefik.http.routers.nstack-robinshark-api.middlewares=nstack-robinshark-api-strip"
      - "traefik.http.middlewares.nstack-robinshark-api-strip.stripprefix.prefixes=/api"
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"const timeout=AbortSignal.timeout(1000); fetch('http://127.0.0.1:8080/__encore/healthz', { signal: timeout }).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: "30s"
      timeout: "1s"
      retries: 3
      start_period: "30s"
      start_interval: "1s"
    depends_on:
      migrate-app:
        condition: "service_completed_successfully"
  postgres-init:
    image: "postgres:17-alpine"
    restart: "no"
    environment:
      PGPASSWORD: "${NSTACK_POSTGRES_PASSWORD:?set NSTACK_POSTGRES_PASSWORD}"
    entrypoint:
      - "/bin/sh"
      - "-c"
    command:
      - "set -eu\nPOSTGRES_HOST='robinshark-postgres-ib8xmr'\nPOSTGRES_PORT='5432'\nPOSTGRES_USER='nstack'\nPOSTGRES_MAINTENANCE_DB='app'\necho \"waiting for postgres at $$POSTGRES_HOST:$$POSTGRES_PORT/$$POSTGRES_MAINTENANCE_DB\"\nuntil pg_isready -h \"$$POSTGRES_HOST\" -p \"$$POSTGRES_PORT\" -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_MAINTENANCE_DB\" >/dev/null 2>&1; do sleep 1; done\necho \"ensuring postgres database app\"\nif [ \"$(psql -v ON_ERROR_STOP=1 -h \"$$POSTGRES_HOST\" -p \"$$POSTGRES_PORT\" -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_MAINTENANCE_DB\" -tAc \"SELECT 1 FROM pg_database WHERE datname = 'app'\")\" != \"1\" ]; then\n  createdb -h \"$$POSTGRES_HOST\" -p \"$$POSTGRES_PORT\" -U \"$$POSTGRES_USER\" --maintenance-db=\"$$POSTGRES_MAINTENANCE_DB\" --owner \"$$POSTGRES_USER\" 'app'\nfi\necho \"postgres database init complete\""
    networks:
      dokploy-network: {}
  migrate-app:
    image: "migrate/migrate:v4.15.2"
    restart: "on-failure:5"
    command:
      - "-path=/migrations"
      - "-database=postgres://nstack:${NSTACK_POSTGRES_PASSWORD:?set NSTACK_POSTGRES_PASSWORD}@robinshark-postgres-ib8xmr:5432/app?sslmode=disable"
      - "up"
    volumes:
      - "../../backend/api/migrations:/migrations:ro"
    depends_on:
      postgres-init:
        condition: "service_completed_successfully"
    networks:
      dokploy-network: {}
networks:
  dokploy-network:
    external: true
